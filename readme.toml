[[sections.items]]
content = """代码的实现细节（即语法）是次要的（不要因为经常在语法上犯错或者数组越界之类的问题而认为这门课“难”而心生逃避，这样会妨碍对知识本质的理解！！），重要的是对恰当地组织数据以及分治等算法思想的理解。考试也不需要写出具体的代码。
数据结构、算法的知识很丰富，本门课只是入门，如果日后用到有关知识，大家还需要进一步深入学习。
"""

